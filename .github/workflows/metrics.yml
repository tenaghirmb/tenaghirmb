name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tenaghirmb
          template: classic
          base: header
          base_indepth: yes
          config_timezone: Asia/Shanghai
          plugins_errors_fatal: no

          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: playing
          plugin_music_token: "${{ secrets.SPOTIFY_TOKENS }}"
          plugin_music_limit: 4
          plugin_music_played_at: yes

          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_ignored: html, css, tex, "Jupyter Notebook", ipynb, jupyter
          plugin_languages_sections: most-used
          plugin_languages_limit: 8

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, projects, languages, editors
          plugin_wakatime_limit: 5
          plugin_wakatime_user: current

          config_order: base.header, isocalendar, languages, wakatime, music, habits
