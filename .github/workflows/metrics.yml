name: Metrics & AI Summary
on:
  # 每天凌晨 0 点运行一次
  schedule: [{cron: "0 0 * * *"}]
  # 支持手动触发运行
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 0. 先拿代码
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # 1. 生成 Metrics 图表 (Lowlighter)
      - name: GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          output_action: none
          path: "."
          user: tenaghirmb
          template: classic
          plugins_errors_fatal: no
          base: header
          plugin_music: yes
          plugin_music_provider: lastfm
          plugin_music_user: tenaghirmb
          plugin_music_token: ${{ secrets.LASTFM_API_KEY }}
          plugin_music_mode: recent
          plugin_music_limit: 4
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_ignored: html, css, tex
          plugin_languages_skipped: HISBs
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_habits: no
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, projects, languages
          plugin_wakatime_limit: 5
          plugin_wakatime_user: current

          config_order: base.header, isocalendar, wakatime, languages, habits, music

      # 2. 准备 Python 环境 (为了运行 Gemini 脚本)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install google-generativeai cairosvg Pillow

      # 3. 运行 Gemini AI 分析并更新 README
      - name: Generate AI Summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 这里直接把 Python 逻辑内嵌进来，省去额外创建文件的麻烦
          python -c "
          import os
          import google.generativeai as genai
          import re
          import cairosvg
          import io
          import subprocess
          from datetime import datetime
          from PIL import Image

          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          model = genai.GenerativeModel('gemini-3-flash-preview')

          try:
              # --- 数据维度 1: 最近提交的时间分布 ---
              # 获取最近 10 次提交的小时数 (00-23)
              raw_times = subprocess.check_output(['git', 'log', '-10', '--format=%ad', '--date=format:%H']).decode('utf-8').split()
              hours = [int(h) for h in raw_times] if raw_times else []
              
              # 判断是否为深夜战神 (23点 - 5点)
              night_owl = any(0 <= h <= 5 or h >= 23 for h in hours)
              time_context = 'Active during standard cycles.'
              if night_owl:
                  time_context = 'WARNING: Neural activity peaks during forbidden hours (00:00-05:00). High nocturnal optimization.'
              
              # --- 数据维度 2: 最近 7 天的 Commit 内容 ---
              raw_commits = subprocess.check_output(['git', 'log', '--since=\"7 days ago\"', '--pretty=format:%s']).decode('utf-8')
              commit_data = raw_commits if raw_commits else 'Quiet maintenance.'
              
              # --- 数据维度 3: 视觉图片 (Metrics SVG) ---
              svg_path = 'github-metrics.svg'
              png_data = cairosvg.svg2png(url=svg_path)
              img = Image.open(io.BytesIO(png_data))

              # --- 深度 Prompt 注入 ---
              prompt = f'''
              [INPUT DATA]
              Recent Commit Logs: {commit_data}
              Circadian Rhythm Analysis: {time_context}
              
              [INSTRUCTION]
              1. Analyze the provided image. Look for the 'Last.fm' section. If you see specific songs or artists, briefly comment on the 'vibe' of the music in relation to the coding activity. Use terms like 'auditory frequency', 'harmonic resonance', or 'rhythmic debugging'. If the user listens to repetitive or melancholic tracks during {time_context}, mock their 'emotional-silicon imbalance'.
              2. You are an advanced Cybernetic System Monitor. Analyze the provided image (metrics) and the input data. If the 'night_owl' context is positive, mention 'nocturnal synchronization' or 'post-midnight logic injection'.
              3. Write a 2-sentence SYSTEM ANALYSIS. Focus on technical trajectory. Start with em.. and keep it under 55 words. Tone: Cyberpunk, sharp, slightly judgmental about music taste, and dismissive of 'human sentiment'.
              '''
              
              response = model.generate_content([prompt, img])
              summary = response.text.strip()
              
              with open('README.md', 'r', encoding='utf-8') as f:
                  content = f.read()

              marker_start = '> **Gemini**: '
              marker_end = '---'
              
              # 如果 README 里没找到标记，则不替换
              if marker_start in content and marker_end in content:
                  # 使用 re.escape 会把 ** 变成 \*\*，使其失去正则魔力，变回普通文本
                  safe_start = re.escape(marker_start)
                  safe_end = re.escape(marker_end)
                  pattern = f'{safe_start}.*?{safe_end}'
                  new_content = re.sub(
                      pattern,
                      f'{marker_start}\n> **{summary}**\n\n{marker_end}',
                      content,
                      flags=re.DOTALL
                  )
                  with open('README.md', 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print('Integrated Analysis successful.')
              else:
                  print('Markers not found in README.md')
          except Exception as e:
              print(f'Critical Integration Error: {e}')
          "

      # 4. 将更改推送到仓库
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: update AI system summary [skip ci]"
          file_pattern: 'README.md github-metrics.svg'
          push_options: '--force'
          add_options: '--all'
