name: Metrics & AI Summary
on:
  # 每天凌晨 0 点运行一次
  schedule: [{cron: "0 0 * * *"}]
  # 支持手动触发运行
  workflow_dispatch:
  # 当 main 分支有推送时运行
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. 生成 Metrics 图表 (Lowlighter)
      - name: GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tenaghirmb
          template: classic
          base: header, repositories
          plugins_errors_fatal: no
          plugin_music: no
          plugin_music_provider: spotify
          plugin_music_mode: playing
          plugin_music_token: "${{ secrets.SPOTIFY_TOKENS }}"
          plugin_music_limit: 4
          plugin_music_played_at: yes
          plugin_languages: no
          plugin_languages_details: bytes-size, percentage
          plugin_languages_ignored: html, css, tex
          plugin_languages_colors: rainbow
          plugin_languages_sections: recently-used
          plugin_languages_recent_load: 500
          plugin_languages_recent_days: 60
          plugin_languages_limit: 8
          plugin_habits: no
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, languages
          plugin_wakatime_limit: 5
          plugin_wakatime_user: current

          config_order: base.header, isocalendar, languages, habits, wakatime, music

      # 2. 准备 Python 环境 (为了运行 Gemini 脚本)
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install google-generativeai cairosvg Pillow

      # 3. 运行 Gemini AI 分析并更新 README
      - name: Generate AI Summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 这里直接把 Python 逻辑内嵌进来，省去额外创建文件的麻烦
          python -c "
          import os
          import google.generativeai as genai
          import re
          import cairosvg
          import io
          from PIL import Image

          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          model = genai.GenerativeModel('gemini-3-flash-preview')

          try:
              # --- 获取数据 A: Commit 日志 ---
              # 获取最近 7 天的 commit (防止 24 小时内没提交导致没数据)
              raw_commits = subprocess.check_output(['git', 'log', '--since=\"7 days ago\"', '--pretty=format:%s']).decode('utf-8')
              commit_data = raw_commits if raw_commits else 'System maintenance and architectural optimization.'
              # --- 获取数据 B: 可视化图片 ---
              svg_path = 'github-metrics.svg'
              png_data = cairosvg.svg2png(url=svg_path)
              img = Image.open(io.BytesIO(png_data))

              # --- 深度 Prompt：要求结合两者 ---
              prompt = f'''
              [CONTEXT]
              Recent Commit Logs: {commit_data}
              
              [INSTRUCTION]
              Analyze the provided image (my coding stats) and the commit logs above. 
              Write a 2-sentence SYSTEM ANALYSIS. 
              Tone: Cyberpunk, sharp, highly analytical. 
              Identify if my actual commits align with the data shown in the image (e.g., language shifts or activity bursts). 
              Start with em.. and keep it under 50 words. Emojis preferred.
              '''
              
              # 同时发送 [文字, 图片]
              response = model.generate_content([prompt, img])
              summary = response.text.strip()
              
              with open('README.md', 'r', encoding='utf-8') as f:
                  content = f.read()

              marker_start = '> Gemini: '
              marker_end = '---'
              
              # 如果 README 里没找到标记，则不替换
              if marker_start in content and marker_end in content:
                  new_content = re.sub(
                      f'{marker_start}.*?{marker_end}',
                      f'{marker_start}\\n> **{summary}**\\n\\n{marker_end}',
                      content,
                      flags=re.DOTALL
                  )
                  with open('README.md', 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print('Integrated Analysis successful.')
              else:
                  print('Markers not found in README.md')
          except Exception as e:
              print(f'Critical Integration Error: {e}')
          "

      # 4. 将更改推送到仓库
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: update AI system summary [skip ci]"
