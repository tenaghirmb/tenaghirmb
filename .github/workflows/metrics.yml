name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tenaghirmb
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_timezone: Asia/Shanghai

          plugin_weather: yes
          plugin_weather_location: Jiaxing
          plugin_weather_format: desc
          plugin_weather_units: metric

          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: playing
          plugin_music_token: "${{ secrets.SPOTIFY_TOKENS }}"
          plugin_music_limit: 4
          plugin_music_played_at: yes

          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          config_order: base.header, isocalendar, languages, music, habits, weather
