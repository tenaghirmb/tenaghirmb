name: Metrics & AI Summary
on:
  # 每天凌晨 0 点运行一次
  schedule: [{cron: "0 0 * * *"}]
  # 支持手动触发运行
  workflow_dispatch:
  # 当 main 分支有推送时运行
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. 生成 Metrics 图表 (Lowlighter)
      - name: GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: tenaghirmb
          template: classic
          base: header, repositories
          plugins_errors_fatal: no
          plugin_music: no
          plugin_music_provider: spotify
          plugin_music_mode: playing
          plugin_music_token: "${{ secrets.SPOTIFY_TOKENS }}"
          plugin_music_limit: 4
          plugin_music_played_at: yes
          plugin_languages: no
          plugin_languages_details: bytes-size, percentage
          plugin_languages_ignored: html, css, tex
          plugin_languages_colors: rainbow
          plugin_languages_sections: recently-used
          plugin_languages_recent_load: 500
          plugin_languages_recent_days: 60
          plugin_languages_limit: 8
          plugin_habits: no
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, languages
          plugin_wakatime_limit: 5
          plugin_wakatime_user: current

          config_order: base.header, isocalendar, languages, habits, wakatime, music

      # 2. 准备 Python 环境 (为了运行 Gemini 脚本)
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install google-generativeai

      # 3. 运行 Gemini AI 分析并更新 README
      - name: Generate AI Summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 这里直接把 Python 逻辑内嵌进来，省去额外创建文件的麻烦
          python -c "
          import os
          import google.generativeai as genai
          import re

          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          model = genai.GenerativeModel('gemini-1.5-flash')

          prompt = 'Analyze my identity as a professional developer. Write a System Status Report in 2 sentences. The tone: Cyberpunk, analytical, and cold. Start with SYSTEM ANALYSIS: and keep it under 40 words. No emojis.'
          
          try:
              response = model.generate_content(prompt)
              summary = response.text.strip()
              
              with open('README.md', 'r', encoding='utf-8') as f:
                  content = f.read()

              marker_start = '> Gemini: '
              marker_end = '---'
              
              # 如果 README 里没找到标记，则不替换
              if marker_start in content and marker_end in content:
                  new_content = re.sub(
                      f'{marker_start}.*?{marker_end}',
                      f'{marker_start}\\n> **{summary}**\\n\\n{marker_end}',
                      content,
                      flags=re.DOTALL
                  )
                  with open('README.md', 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print('AI Summary updated successfully.')
              else:
                  print('Markers not found in README.md')
          except Exception as e:
              print(f'Error: {e}')
          "

      # 4. 将更改推送到仓库
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: update AI system summary [skip ci]"
